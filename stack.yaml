version: '3.9'

name: influxdb2

networks:
  influxdb2:
  frontend:
    external: true
  
services:
  influxdb2:
    networks: ['influxdb2', 'frontend']
    image: influxdb:latest
    container_name: influxdb2
    volumes:
      - influxdb2-data:/var/lib/influxdb2
      - influxdb2-config:/etc/influxdb2
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_INIT_USERNAME}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_INIT_PASSWORD}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_INIT_ADMIN_TOKEN}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_INIT_ORG:-docs}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_INIT_BUCKET:-home}

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=frontend"
      - "traefik.http.routers.influxdb2-https.tls=true"
      - "traefik.http.routers.influxdb2-https.tls.certresolver=route53"
      - "traefik.http.routers.influxdb2-https.rule=Host(`${FQDN}`)"
      - "traefik.http.routers.influxdb2-https.entrypoints=websecure"
      - "traefik.http.routers.influxdb2-https.service=influxdb2-svc"
      - "traefik.http.services.influxdb2-svc.loadbalancer.server.port=8086"

volumes:
  influxdb2-data:
  influxdb2-config:
    

    


