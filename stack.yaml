version: "3.9"

name: influxdb2

networks:
  influxdb2:
  frontend:
    external: true

services:
  influxdb2:
    networks: ["influxdb2", "frontend"]
    image: influxdb:latest
    container_name: influxdb2
    volumes:
      - influxdb2-data:/var/lib/influxdb2
      - influxdb2-config:/etc/influxdb2
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_INIT_USERNAME}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_INIT_PASSWORD}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_INIT_ADMIN_TOKEN}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_INIT_ORG:-docs}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_INIT_BUCKET:-home}
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=frontend"
      - "traefik.http.routers.influxdb2-https.tls=true"
      - "traefik.http.routers.influxdb2-https.tls.certresolver=route53"
      - "traefik.http.routers.influxdb2-https.rule=Host(`${FQDN_influxdb2}`)"
      - "traefik.http.routers.influxdb2-https.entrypoints=websecure"
      - "traefik.http.routers.influxdb2-https.service=influxdb2-svc"
      - "traefik.http.services.influxdb2-svc.loadbalancer.server.port=8086"

  grafana:
    networks: ["influxdb2", "frontend"]
    image: grafana/grafana:latest
    container_name: grafana
    user: "472" # keeps permissions sane with the official image
    depends_on:
      - influxdb2
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      # Server / URL correctness (important behind reverse proxy + OIDC redirects)
      GF_SERVER_ROOT_URL: "https://${FQDN_grafana}"
      GF_SERVER_SERVE_FROM_SUB_PATH: "false"

      # Optional: stop Grafana from presenting the local login form
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_AUTH_SIGNOUT_REDIRECT_URL: "${GF_AUTH_SIGNOUT_REDIRECT_UR}"

      # --- Authentik OIDC (Generic OAuth) ---
      GF_AUTH_GENERIC_OAUTH_ENABLED: "true"
      GF_AUTH_GENERIC_OAUTH_NAME: "Authentik"
      GF_AUTH_GENERIC_OAUTH_ALLOW_SIGN_UP: "true"

      GF_AUTH_GENERIC_OAUTH_CLIENT_ID: "${GRAFANA_OIDC_CLIENT_ID}"
      GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET: "${GRAFANA_OIDC_CLIENT_SECRET}"

      # Auth endpoints (set these in .env)
      GF_AUTH_GENERIC_OAUTH_AUTH_URL: "${GRAFANA_OIDC_AUTH_URL}"
      GF_AUTH_GENERIC_OAUTH_TOKEN_URL: "${GRAFANA_OIDC_TOKEN_URL}"
      GF_AUTH_GENERIC_OAUTH_API_URL: "${GRAFANA_OIDC_USERINFO_URL}"

      # Scopes: openid+profile+email is the usual minimum
      GF_AUTH_GENERIC_OAUTH_SCOPES: "openid profile email"

      # Map user identity
      GF_AUTH_GENERIC_OAUTH_LOGIN_ATTRIBUTE_PATH: "preferred_username"
      GF_AUTH_GENERIC_OAUTH_NAME_ATTRIBUTE_PATH: "name"
      GF_AUTH_GENERIC_OAUTH_EMAIL_ATTRIBUTE_PATH: "email"

      # Optional: enforce role mapping (see notes below)
      # GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH: "${GRAFANA_OIDC_ROLE_ATTR_PATH}"
      # GF_AUTH_GENERIC_OAUTH_ALLOW_ASSIGN_GRAFANA_ADMIN: "false"

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=frontend"

      - "traefik.http.routers.grafana-https.tls=true"
      - "traefik.http.routers.grafana-https.tls.certresolver=route53"
      - "traefik.http.routers.grafana-https.rule=Host(`${FQDN_grafana}`)"
      - "traefik.http.routers.grafana-https.entrypoints=websecure"
      - "traefik.http.routers.grafana-https.service=grafana-svc"
      - "traefik.http.services.grafana-svc.loadbalancer.server.port=3000"

volumes:
  influxdb2-data:
  influxdb2-config:
  grafana-data: